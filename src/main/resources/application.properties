spring.application.name=espigapedidos

spring.datasource.url=jdbc:mysql://localhost:3306/espiga_pedidos
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false
server.port=8080

app.setup.admin-password=${SETUP_ADMIN_PASSWORD}
app.setup.tienda-password=${SETUP_TIENDA_PASSWORD}