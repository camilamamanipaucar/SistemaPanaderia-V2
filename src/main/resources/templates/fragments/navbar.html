<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Barra de navegación - EspigaPedidos</title>
    <meta charset="UTF-8">
</head>

<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">EspigaPedidos</a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu"
                aria-controls="menu"
                aria-expanded="false"
                aria-label="Alternar navegación">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/productos}">Productos</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/tiendas}">Tiendas</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','TIENDA')">
                    <a class="nav-link" th:href="@{/pedidos}">Pedidos</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','TIENDA')">
                    <a class="nav-link" th:href="@{/pedidos-especiales}">Pedidos Especiales</a>
                </li>

                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <button type="submit" class="btn btn-outline-warning btn-sm ms-2">
                            Cerrar sesión
                        </button>
                    </form>
                </li>

            </ul>
        </div>
    </div>
</nav>
</body>
</html>
