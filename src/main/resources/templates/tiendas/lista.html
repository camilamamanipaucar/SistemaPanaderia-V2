<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Lista de Tiendas</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <h1>Lista de Tiendas</h1>

    <a th:href="@{/tiendas/nuevo}" class="btn btn-primary mb-3">Nueva Tienda</a>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Dirección</th>
            <th>Teléfono</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="tienda : ${tiendas}">
            <td th:text="${tienda.id}"></td>
            <td th:text="${tienda.nombre}"></td>
            <td th:text="${tienda.direccion}"></td>
            <td th:text="${tienda.telefono}"></td>
            <td th:text="${tienda.estado}"></td>
            <td>

                <!-- EDITAR (OK usar <a>) -->
                <a th:href="@{/tiendas/editar/{id}(id=${tienda.id})}"
                   class="btn btn-warning btn-sm">Editar</a>

                <!-- ELIMINAR (CORRECTO con form POST) -->
                <form th:action="@{/tiendas/eliminar/{id}(id=${tienda.id})}"
                      method="post"
                      style="display:inline;"
                      onsubmit="return confirm('¿Seguro que deseas eliminar esta tienda?')">

                    <button type="submit" class="btn btn-danger btn-sm">
                        Eliminar
                    </button>
                </form>

            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
