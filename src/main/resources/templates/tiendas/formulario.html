<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Formulario de Tienda</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <h1>
        <span th:text="${tienda.id == null} ? 'Nueva Tienda' : 'Editar Tienda'">
            Formulario de Tienda
        </span>
    </h1>

    <form th:action="@{/tiendas/guardar}" th:object="${tienda}" method="post">
        <input type="hidden" th:field="*{id}" id="id">

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input id="nombre" type="text" th:field="*{nombre}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="direccion" class="form-label">Dirección</label>
            <input id="direccion" type="text" th:field="*{direccion}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="telefono" class="form-label">Teléfono</label>
            <input id="telefono" type="tel" th:field="*{telefono}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="estado" class="form-label">Estado</label>
            <input id="estado" type="text" th:field="*{estado}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/tiendas}" class="btn btn-secondary">Volver</a>
    </form>
</div>
</body>
</html>
