<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Nuevo Pedido Especial</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <h1>Nuevo Pedido Especial</h1>

    <form th:action="@{/pedidos-especiales/guardar}"
          th:object="${pedidoEspecial}"
          method="post"
          enctype="multipart/form-data">

        <div class="mb-3">
            <label for="cliente" class="form-label">Cliente</label>
            <input id="cliente" type="text" th:field="*{cliente}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="telefono" class="form-label">Teléfono</label>
            <input id="telefono" type="text" th:field="*{telefono}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea id="descripcion" th:field="*{descripcion}" class="form-control" required></textarea>
        </div>

        <div class="mb-3">
            <label for="sabor" class="form-label">Sabor</label>
            <input id="sabor" type="text" th:field="*{sabor}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="tamano" class="form-label">Tamaño</label>
            <input id="tamano" type="text" th:field="*{tamano}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="fechaEntrega" class="form-label">Fecha de entrega</label>
            <input id="fechaEntrega" type="date" th:field="*{fechaEntrega}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="estado" class="form-label">Estado</label>
            <input id="estado" type="text" th:field="*{estado}" class="form-control" value="Pendiente" required>
        </div>

        <div class="mb-3">
            <label for="tiendaId" class="form-label">Tienda</label>
            <select id="tiendaId" th:field="*{tiendaId}" class="form-control" required>
                <option value="">Seleccione una tienda</option>
                <option th:each="tienda : ${tiendas}"
                        th:value="${tienda.id}"
                        th:text="${tienda.nombre}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="archivoImagen" class="form-label">Imagen de referencia</label>
            <input id="archivoImagen" type="file" name="archivoImagen" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/pedidos-especiales}" class="btn btn-secondary">Volver</a>
    </form>
</div>

</body>
</html>
