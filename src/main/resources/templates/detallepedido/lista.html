<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Detalles</title> </head>
    <meta charset="UTF-8">
    <title>Lista de Detalles de Pedido</title>
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <h1>Detalle del Pedido</h1>

    <p><strong>ID Pedido:</strong> <span th:text="${pedido.id}"></span></p>
    <p><strong>Fecha:</strong> <span th:text="${pedido.fecha}"></span></p>
    <p><strong>Tienda:</strong> <span th:text="${pedido.tienda.nombre}"></span></p>

    <a th:href="@{/detalle-pedido/nuevo/{pedidoId}(pedidoId=${pedido.id})}" class="btn btn-primary mb-3">
        Agregar Producto
    </a>

    <a th:href="@{/pedidos}" class="btn btn-secondary mb-3">Volver a Pedidos</a>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="detalle : ${detalles}">
            <td th:text="${detalle.id}"></td>
            <td th:text="${detalle.producto.nombre}"></td>
            <td th:text="${detalle.cantidad}"></td>
            <td>
            <form th:action="@{/detalle-pedido/eliminar/{id}/{pedidoId}(id=${detalle.id},pedidoId=${pedido.id})}" 
      method="post" style="display:inline;">
    <button type="submit" 
            class="btn btn-danger btn-sm" 
            aria-label="Eliminar detalle"
            onclick="return confirm('¿Seguro que deseas eliminar este detalle?')">
        <i class="bi bi-trash"></i> Eliminar
    </button>
</form>
</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
